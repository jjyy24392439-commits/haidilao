<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<title>Haidilao Game</title>

<style>

body{

margin:0;
height:100vh;

background-image:url("haidilao.jpg");
background-size:cover;
background-position:center;

display:flex;
justify-content:center;
align-items:center;
flex-direction:column;

font-family:"KaiTi","STKaiti","SimSun",serif;

}

.question{

font-size:50px;
color:#b30000;

text-shadow:
-2px -2px 0 white,
2px -2px 0 white,
-2px 2px 0 white,
2px 2px 0 white;

text-align:center;
margin-bottom:40px;

}

.buttonArea{

position:relative;
width:400px;
height:200px;

display:flex;
justify-content:center;
align-items:center;
gap:40px;

}

button{

width:120px;
height:60px;

font-size:22px;

background:white;

border:4px solid red;

cursor:pointer;

}

#no{

position:absolute;

}

</style>

</head>

<body>

<div class="question">
3월 12일 목요일 하이디라오 홍대점에 방문하시겠습니까?
</div>

<div class="buttonArea">

<button id="yes">YES</button>

<button id="no">NO</button>

</div>

<script>

const noBtn = document.getElementById("no")
const area = document.querySelector(".buttonArea")

area.addEventListener("mousemove",function(e){

const rect = noBtn.getBoundingClientRect()

const distanceX = Math.abs(e.clientX - (rect.left + rect.width/2))
const distanceY = Math.abs(e.clientY - (rect.top + rect.height/2))

if(distanceX < 120 && distanceY < 80){

const maxX = area.clientWidth - noBtn.clientWidth
const maxY = area.clientHeight - noBtn.clientHeight

const randX = Math.random()*maxX
const randY = Math.random()*maxY

noBtn.style.left = randX + "px"
noBtn.style.top = randY + "px"

}

})

document.getElementById("yes").onclick = function(){

alert("예약 완료! 🎉 하이디라오 갑시다!")

}

</script>

</body>

</html>
